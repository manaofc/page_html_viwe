<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HTML Fetcher Tool</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: "Segoe UI", sans-serif;
      margin: 0;
      padding: 20px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #333;
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .input-group {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      outline: none;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #667eea;
      color: #fff;
      transition: 0.3s;
    }

    button:hover {
      background: #5a67d8;
    }

    textarea {
      width: 100%;
      height: 250px;
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-family: monospace;
    }

    iframe {
      width: 100%;
      height: 350px;
      border: none;
      margin-top: 10px;
      border-radius: 8px;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .copy-btn {
      background: #28a745;
    }

    .copy-btn:hover {
      background: #218838;
    }

    .download-btn {
      background: #ff9800;
    }

    .download-btn:hover {
      background: #e68900;
    }

  </style>
</head>
<body>

<div class="container">

  <h2>🌐 HTML Fetch Tool</h2>

  <div class="input-group">
    <input type="text" id="url" placeholder="Enter URL here">
    <button onclick="fetchHTML()">Fetch</button>
  </div>

  <h3>📄 HTML Output</h3>
  <textarea id="output"></textarea>

  <div class="actions">
    <button class="copy-btn" onclick="copyHTML()">📋 Copy Code</button>
    <button class="download-btn" onclick="downloadHTML()">⬇ Download HTML</button>
  </div>

  <h3>👀 Live Preview</h3>
  <iframe id="preview"></iframe>

</div>

<script>
  async function fetchHTML() {
    const url = document.getElementById("url").value;

    if (!url) {
      alert("Enter a URL!");
      return;
    }

    try {
      const res = await fetch("/fetch", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ url })
      });

      const data = await res.json();

      if (data.success) {
        document.getElementById("output").value = data.html;
        document.getElementById("preview").srcdoc = data.html;
      } else {
        alert("Error: " + data.error);
      }

    } catch (err) {
      alert("Request failed!");
    }
  }

  function downloadHTML() {
    const content = document.getElementById("output").value;

    const blob = new Blob([content], { type: "text/html" });
    const a = document.createElement("a");

    a.href = URL.createObjectURL(blob);
    a.download = "page.html";
    a.click();
  }

  function copyHTML() {
    const textarea = document.getElementById("output");
    textarea.select();
    textarea.setSelectionRange(0, 99999);

    navigator.clipboard.writeText(textarea.value)
      .then(() => {
        alert("Copied to clipboard!");
      })
      .catch(() => {
        alert("Copy failed!");
      });
  }
</script>

</body>
</html>
