<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HTML Fetcher Tool</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f4f4f4;
    }

    input, button {
      padding: 10px;
      margin: 5px;
    }

    textarea {
      width: 100%;
      height: 300px;
    }

    iframe {
      width: 100%;
      height: 400px;
      border: 1px solid #ccc;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <h2>🌐 HTML Fetch Tool</h2>

  <input type="text" id="url" placeholder="Enter URL here" size="50">
  <button onclick="fetchHTML()">Fetch</button>

  <h3>📄 HTML Output</h3>
  <textarea id="output"></textarea>

  <br>
  <button onclick="downloadHTML()">⬇ Download HTML</button>

  <h3>👀 Live Preview</h3>
  <iframe id="preview"></iframe>

  <script>
    async function fetchHTML() {
      const url = document.getElementById("url").value;

      if (!url) {
        alert("Enter a URL!");
        return;
      }

      try {
        const res = await fetch("/fetch", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ url })
        });

        const data = await res.json();

        if (data.success) {
          document.getElementById("output").value = data.html;
          document.getElementById("preview").srcdoc = data.html;
        } else {
          alert("Error: " + data.error);
        }

      } catch (err) {
        alert("Request failed!");
      }
    }

    function downloadHTML() {
      const content = document.getElementById("output").value;

      const blob = new Blob([content], { type: "text/html" });
      const a = document.createElement("a");

      a.href = URL.createObjectURL(blob);
      a.download = "page.html";
      a.click();
    }
  </script>

</body>
</html>
